const SALT="pusulam2026";
function xorEnc(t,key){const k=key+SALT;let r="";for(let i=0;i<t.length;i++)r+=String.fromCharCode(t.charCodeAt(i)^k.charCodeAt(i%k.length));return btoa(unescape(encodeURIComponent(r)));}

  async set(path,val,encKey){try{const enc=xorEnc(JSON.stringify(val),encKey);await db.ref(path).set(enc);return true;}catch(e){console.error('FB set:',e);return false;}},
  async get(path,encKey){try{const snap=await db.ref(path).once('value');const enc=snap.val();if(!enc)return null;const dec=xorDec(enc,encKey);return dec?JSON.parse(dec):null;}catch(e){console.error('FB get:',e);return null;}},
  async remove(path){try{await db.ref(path).remove();}catch{}},
  onValue(path,encKey,cb){return db.ref(path).on('value',snap=>{const enc=snap.val();if(!enc){cb(null);return;}try{const dec=xorDec(enc,encKey);cb(dec?JSON.parse(dec):null);}catch{cb(null);}});}
};

function ldk(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function fmt(s){return new Date(s+'T00:00:00').toLocaleDateString('tr-TR',{day:'numeric',month:'short'});}

function genCode(){const ch="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";let c="";for(let i=0;i<8;i++)c+=ch[Math.floor(Math.random()*ch.length)];return c.slice(0,4)+"-"+c.slice(4);}

const SYNC_KEYS=["profil","hedef","denemeler","hayallerim","ihtiyaclarim","notlar","evals","uyku_log","hatirlatma"];

async function syncAll(sid,ek){
  if(!sid||!ek)return 0;let c=0;
  const allData={};
  for(const k of SYNC_KEYS){const v=LOCAL.get(k);if(v!==null){allData[k]=v;c++;}}
  for(let i=-15;i<=5;i++){const wk=gwk(i);const v=LOCAL.get('week_'+wk);if(v!==null){allData['week_'+wk]=v;c++;}}
  for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k?.startsWith('ya_degerlendirme_')){const sk=k.replace('ya_','');const v=LOCAL.get(sk);if(v){allData[sk]=v;c++;}}}
  const today=new Date().toISOString().slice(0,10);
  const odak=LOCAL.get('odak_'+today);if(odak){allData['odak_'+today]=odak;c++;}
  const pom=LOCAL.get('pom_'+today);if(pom){allData['pom_'+today]=pom;c++;}
  // Tek seferde Firebase'e yaz
  await FB.set(`students/${sid}`,allData,ek);
  return c;
}

async function loadTasks(sid,ek){
  const data=await FB.get(`tasks/${sid}`,ek);
  if(!data)return[];
  return Object.entries(data).map(([id,t])=>({...t,id,_key:id})).sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
}
